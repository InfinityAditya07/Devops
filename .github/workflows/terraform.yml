name: Terraform Provisioning

on:
  push:
    branches:
      - main
    paths:
      - 'terraform/**'
  workflow_dispatch:

env:
  TF_STATE_BUCKET: ${{ secrets.TF_STATE_BUCKET }}
  TF_STATE_KEY: devops/shopsmart.tfstate
  TF_IN_AUTOMATION: "true"

jobs:
  terraform:
    name: Terraform Apply
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: ./terraform

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      # Step 1: Authenticate with the initial voclabs credentials from Learner Lab
      - name: Configure AWS Credentials (voclabs)
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-session-token: ${{ secrets.AWS_SESSION_TOKEN }}
          aws-region: us-east-1

      # Step 2: Assume LabRole — which has full permissions in AWS Academy.
      # voclabs is restricted by voc-cancel-cred policy; LabRole is not.
      - name: Assume LabRole
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          ROLE_ARN="arn:aws:iam::${ACCOUNT_ID}:role/LabRole"
          echo "Assuming role: $ROLE_ARN"

          CREDS=$(aws sts assume-role \
            --role-arn "$ROLE_ARN" \
            --role-session-name "github-actions-terraform" \
            --duration-seconds 3600 \
            --query 'Credentials' \
            --output json)

          echo "AWS_ACCESS_KEY_ID=$(echo $CREDS | jq -r .AccessKeyId)"         >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$(echo $CREDS | jq -r .SecretAccessKey)" >> $GITHUB_ENV
          echo "AWS_SESSION_TOKEN=$(echo $CREDS | jq -r .SessionToken)"         >> $GITHUB_ENV
          echo "✅ Now running as LabRole"

      - name: Validate required secrets
        run: |
          test -n "${{ secrets.AWS_ACCESS_KEY_ID }}"    || (echo "❌ Missing AWS_ACCESS_KEY_ID"    && exit 1)
          test -n "${{ secrets.AWS_SECRET_ACCESS_KEY }}" || (echo "❌ Missing AWS_SECRET_ACCESS_KEY" && exit 1)
          test -n "${{ secrets.AWS_SESSION_TOKEN }}"    || (echo "❌ Missing AWS_SESSION_TOKEN"    && exit 1)
          test -n "${{ env.TF_STATE_BUCKET }}"          || (echo "❌ Missing TF_STATE_BUCKET — create an S3 bucket for Terraform state and add it as a secret" && exit 1)
          echo "✅ All required secrets present"

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "1.9.8"

      - name: Terraform Init
        run: |
          terraform init -input=false \
            -backend-config="bucket=${{ env.TF_STATE_BUCKET }}" \
            -backend-config="key=${{ env.TF_STATE_KEY }}" \
            -backend-config="region=us-east-1"

      - name: Terraform Validate
        run: terraform validate

      # -------------------------------------------------------
      # Idempotent S3 import — if the bucket already exists in
      # AWS but is NOT in Terraform state (e.g. after state loss),
      # import it so `terraform apply` won't error with
      # "BucketAlreadyOwnedByYou".
      # -------------------------------------------------------
      - name: Import existing S3 bucket (idempotent)
        run: |
          ACCOUNT_ID=$(aws sts get-caller-identity --query Account --output text)
          BUCKET_NAME="shopsmart-assets-${ACCOUNT_ID}"

          if aws s3api head-bucket --bucket "$BUCKET_NAME" 2>/dev/null; then
            echo "✅ Bucket '$BUCKET_NAME' exists in AWS."

            if terraform state show aws_s3_bucket.app_bucket >/dev/null 2>&1; then
              echo "📋 Already in Terraform state — nothing to import."
            else
              echo "⬇️  Not in state — importing into Terraform..."
              terraform import aws_s3_bucket.app_bucket "$BUCKET_NAME"
              echo "✅ Import complete."
            fi
          else
            echo "🆕 Bucket does not exist yet — Terraform will create it."
          fi

      - name: Terraform Plan
        run: terraform plan -input=false -out=tfplan

      - name: Terraform Apply
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: terraform apply -input=false -auto-approve tfplan

      - name: Print ALB URL to Job Summary
        if: github.ref == 'refs/heads/main' && github.event_name == 'push'
        run: |
          set -euo pipefail
          ALB_DNS="$(terraform output -raw alb_url 2>/dev/null || true)"
          if [ -z "$ALB_DNS" ] || [ "$ALB_DNS" = "null" ]; then
            ALB_DNS="http://$(aws elbv2 describe-load-balancers \
              --region us-east-1 \
              --query 'LoadBalancers[?contains(LoadBalancerName, `shopsmart-alb`)].DNSName | [0]' \
              --output text)"
          fi
          echo "## 🚀 ShopSmart is Live!"                                      >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "Open this URL in your browser (use **http://** not https://):" >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "**${ALB_DNS}**"                                                >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "- Health check: \`${ALB_DNS}/api/health\`"                    >> "$GITHUB_STEP_SUMMARY"
          echo ""                                                               >> "$GITHUB_STEP_SUMMARY"
          echo "Deployed at: $(date -u '+%Y-%m-%d %H:%M UTC')"                >> "$GITHUB_STEP_SUMMARY"
